databaseChangeLog:
  - changeSet:
      id: 002-indexes-accounts
      author: dev
      runInTransaction: false
      changes:
        - sql: "CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_accounts_user_currency ON accounts (user_id, currency);"
        - sql: "CREATE UNIQUE INDEX CONCURRENTLY IF NOT EXISTS ux_accounts_account_number ON accounts (account_number);"
      rollback:
        - sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_accounts_user_currency;"
        - sql: "DROP INDEX CONCURRENTLY IF EXISTS ux_accounts_account_number;"

  - changeSet:
      id: 003-indexes-history
      author: dev
      runInTransaction: false
      changes:
        - sql: "CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_acc_hist_account_created ON account_history (account_id, created_at);"
        - sql: "CREATE INDEX CONCURRENTLY IF NOT EXISTS idx_acc_hist_transfer ON account_history (transfer_id);"
      rollback:
        - sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_acc_hist_account_created;"
        - sql: "DROP INDEX CONCURRENTLY IF EXISTS idx_acc_hist_transfer;"
