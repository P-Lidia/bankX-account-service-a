databaseChangeLog:
  - changeSet:
      id: 000-enable-pgcrypto
      author: dev
      preConditions:
        - dbms:
            type: postgresql
          onFail: MARK_RAN
      changes:
        - sql:
            splitStatements: false
            sql: "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      rollback:
        - sql: "DROP EXTENSION IF EXISTS pgcrypto;"
